<html>
  <head><title>@hpke/ohttp test</title></head>
  <body>
    <script type="module">
      import { OhttpClient, OhttpServer } from "./src/hpke-ohttp.js";
      import {
        Aes128Gcm,
        Aes256Gcm,
        DhkemP256HkdfSha256,
        DhkemX25519HkdfSha256,
        HkdfSha256,
      } from "./src/hpke-core.js";

      async function testRoundtrip(kem, kdf, aead) {
        const server = await OhttpServer.setup({
          keyId: 0x01,
          kem,
          kdfAeadPairs: [{ kdf, aead }],
        });
        const keyConfig = await server.publicKeyConfig;
        const client = new OhttpClient({
          kem,
          kdf,
          aead,
          keyConfig,
          relayUrl: "https://relay.example/ohttp",
        });
        const targetReq = new Request("https://target.example/api", {
          method: "POST",
          body: "hello world!",
        });
        const clientCtx = await client.encapsulateRequest(targetReq);
        const serverCtx = await server.decapsulateRequest(
          clientCtx.encRequest,
        );
        const body = await serverCtx.request.text();
        if (body !== "hello world!") {
          throw new Error("body mismatch: " + body);
        }
        const encRes = await serverCtx.encapsulateResponse(
          new Response("ok from server"),
        );
        const res = await clientCtx.decapsulateResponse(encRes);
        const resBody = await res.text();
        if (resBody !== "ok from server") {
          throw new Error("response mismatch: " + resBody);
        }
      }

      globalThis.run = async () => {
        let pass = 0;
        let fail = 0;

        // Test 1: X25519 / HKDF-SHA256 / AES-128-GCM
        try {
          await testRoundtrip(
            new DhkemX25519HkdfSha256(),
            new HkdfSha256(),
            new Aes128Gcm(),
          );
          pass++;
        } catch (e) {
          console.error("X25519/AES-128-GCM:", e);
          fail++;
        }

        // Test 2: X25519 / HKDF-SHA256 / AES-256-GCM
        try {
          await testRoundtrip(
            new DhkemX25519HkdfSha256(),
            new HkdfSha256(),
            new Aes256Gcm(),
          );
          pass++;
        } catch (e) {
          console.error("X25519/AES-256-GCM:", e);
          fail++;
        }

        // Test 3: P-256 / HKDF-SHA256 / AES-128-GCM
        try {
          await testRoundtrip(
            new DhkemP256HkdfSha256(),
            new HkdfSha256(),
            new Aes128Gcm(),
          );
          pass++;
        } catch (e) {
          console.error("P-256/AES-128-GCM:", e);
          fail++;
        }

        document.getElementById("pass").innerHTML = pass;
        document.getElementById("fail").innerHTML = fail;
      };

      globalThis.reset = () => {
        document.getElementById("pass").innerHTML = "-";
        document.getElementById("fail").innerHTML = "-";
      };
    </script>

    <h1>
      <a href="https://github.com/dajiaji/hpke-js">@hpke/ohttp</a>
      test
    </h1>

    <div id="operation">
      <button type="button" onclick="run()">run</button>
      <button type="button" onclick="reset()">reset</button>
    </div>

    <br />

    <div id="test">
      <table>
        <tr>
          <th><font color="green">pass:</font></th>
          <td id="pass">-</td>
        </tr>
        <tr>
          <th><font color="red">fail:</font></th>
          <td id="fail">-</td>
        </tr>
      </table>
    </div>
  </body>
</html>
