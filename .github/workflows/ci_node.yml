name: Node.js CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "**/*.mdc"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "**/*.mdc"

permissions:
  contents: read

env:
  # Packages that are ESM-only and require Node >= 20
  ESM_ONLY_PACKAGES: '["cose","jose","ohttp"]'

jobs:
  # Check changed files to determine which package tests to run
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      run-all: ${{ steps.changes.outputs.run-all }}
      packages: ${{ steps.changes.outputs.packages }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check for changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Get diff from previous commit
          if [ "$EVENT_NAME" = "push" ]; then
            # For push: diff from previous commit
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            # For PR: diff from base branch
            CHANGED_FILES=$(git diff --name-only origin/"$BASE_REF"...HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Run all tests if common, core, CI/CD files, or root files are changed
          if echo "$CHANGED_FILES" | grep -E '^(packages/(common|core)/|\.github/|deno\.jsonc|\.gitignore|tsconfig\.json|npm/|utils/)'; then
            echo "run-all=true" >> $GITHUB_OUTPUT
            echo "packages=[]" >> $GITHUB_OUTPUT
          else
            # Only specific packages are changed
            CHANGED_PACKAGES=$(echo "$CHANGED_FILES" | grep '^packages/' | cut -d'/' -f2 | sort -u | grep -v -E '^(common|core)$' | jq -R -s -c 'split("\n")[:-1]')
            if [ "$CHANGED_PACKAGES" = "[]" ] || [ "$CHANGED_PACKAGES" = '[""]' ]; then
              echo "run-all=false" >> $GITHUB_OUTPUT
              echo "packages=[]" >> $GITHUB_OUTPUT
            else
              echo "run-all=false" >> $GITHUB_OUTPUT
              echo "packages=$CHANGED_PACKAGES" >> $GITHUB_OUTPUT
            fi
          fi

  # Job to run all tests
  build-all:
    needs: check-changes
    if: needs.check-changes.outputs.run-all == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16, 18, 19, 20, 21, 22, 23, 24, 25]

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: 2.x
      - name: Run test
        run: |
          if [ ${{ matrix.node-version }} -lt 20 ]; then
            deno task test:node:cjs-compat
          else
            deno task test:node
          fi
      - name: Publish to npm (dry)
        if: matrix.node-version != 24
        run: |
          if [ ${{ matrix.node-version }} -lt 20 ]; then
            deno task dry-publish:cjs-compat
          else
            deno task dry-publish
          fi

  # Job to test only specific packages
  build-packages:
    needs: check-changes
    if: needs.check-changes.outputs.run-all == 'false' && needs.check-changes.outputs.packages != '[]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16, 18, 19, 20, 21, 22, 23, 24, 25]
        package: ${{ fromJson(needs.check-changes.outputs.packages) }}

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: 2.x
      - name: Run package-specific node test
        if: matrix.node-version >= 20 || !contains(fromJson(env.ESM_ONLY_PACKAGES), matrix.package)
        env:
          PACKAGE: ${{ matrix.package }}
        run: |
          deno task npm
          deno task test:node:"$PACKAGE"
      - name: Publish package to npm (dry)
        if: matrix.node-version != 24 && (matrix.node-version >= 20 || !contains(fromJson(env.ESM_ONLY_PACKAGES), matrix.package))
        env:
          PACKAGE: ${{ matrix.package }}
        run: deno task dry-publish:"$PACKAGE"
