<html>
  <head><title>@hpke/jose test</title></head>
  <body>
    <script type="module">
      import {
        ContentEncAlg,
        createHpke0,
        createHpke0Ke,
        createHpke3,
        createHpke3Ke,
      } from "./src/hpke-jose.js";

      globalThis.run = async () => {
        let pass = 0;
        let fail = 0;
        const msg = new TextEncoder().encode("hello world!");

        // Test 1: Integrated Encryption with HPKE-0 (P-256, AES-128-GCM)
        try {
          const e0 = createHpke0();
          const kp = await e0.suite.kem.generateKeyPair();
          const jwe = await e0.seal(kp.publicKey, msg);
          const pt = await e0.open(kp, jwe);
          new TextDecoder().decode(pt) === "hello world!" ? pass++ : fail++;
        } catch (e) {
          console.error("Integrated HPKE-0:", e);
          fail++;
        }

        // Test 2: Integrated Encryption with HPKE-3 (X25519, AES-128-GCM)
        try {
          const e0 = createHpke3();
          const kp = await e0.suite.kem.generateKeyPair();
          const jwe = await e0.seal(kp.publicKey, msg);
          const pt = await e0.open(kp, jwe);
          new TextDecoder().decode(pt) === "hello world!" ? pass++ : fail++;
        } catch (e) {
          console.error("Integrated HPKE-3:", e);
          fail++;
        }

        // Test 3: Key Encryption with HPKE-0-KE (P-256, A128GCM content)
        try {
          const ke = createHpke0Ke(ContentEncAlg.A128GCM);
          const kp = await ke.generateKemKeyPair();
          const jwe = await ke.seal(
            [{ recipientPublicKey: kp.publicKey }],
            msg,
          );
          const pt = await ke.open(kp, jwe);
          new TextDecoder().decode(pt) === "hello world!" ? pass++ : fail++;
        } catch (e) {
          console.error("KE HPKE-0-KE:", e);
          fail++;
        }

        // Test 4: Key Encryption with HPKE-3-KE (X25519, A128GCM content)
        try {
          const ke = createHpke3Ke(ContentEncAlg.A128GCM);
          const kp = await ke.generateKemKeyPair();
          const jwe = await ke.seal(
            [{ recipientPublicKey: kp.publicKey }],
            msg,
          );
          const pt = await ke.open(kp, jwe);
          new TextDecoder().decode(pt) === "hello world!" ? pass++ : fail++;
        } catch (e) {
          console.error("KE HPKE-3-KE:", e);
          fail++;
        }

        document.getElementById("pass").innerHTML = pass;
        document.getElementById("fail").innerHTML = fail;
      };

      globalThis.reset = () => {
        document.getElementById("pass").innerHTML = "-";
        document.getElementById("fail").innerHTML = "-";
      };
    </script>

    <h1>
      <a href="https://github.com/dajiaji/hpke-js">@hpke/jose</a>
      test
    </h1>

    <div id="operation">
      <button type="button" onclick="run()">run</button>
      <button type="button" onclick="reset()">reset</button>
    </div>

    <br />

    <div id="test">
      <table>
        <tr>
          <th><font color="green">pass:</font></th>
          <td id="pass">-</td>
        </tr>
        <tr>
          <th><font color="red">fail:</font></th>
          <td id="fail">-</td>
        </tr>
      </table>
    </div>
  </body>
</html>
